<h2>Admin: Attendance Logs</h2>

<label>From <input [(ngModel)]="from" type="date" (change)="load()" /></label>
<label>To <input [(ngModel)]="to" type="date" (change)="load()" /></label>
<button (click)="exportCSV()">Export CSV</button>

<table mat-table [dataSource]="logs" class="mat-elevation-z8">
  <ng-container matColumnDef="fullName">
    <th mat-header-cell *matHeaderCellDef>User</th>
    <td mat-cell *matCellDef="let r">{{ r.fullName }}</td>
  </ng-container>
  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let r">{{ r.email }}</td>
  </ng-container>
  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>Type</th>
    <td mat-cell *matCellDef="let r">{{ r.type }}</td>
  </ng-container>
  <ng-container matColumnDef="timestamp">
    <th mat-header-cell *matHeaderCellDef>Timestamp</th>
    <td mat-cell *matCellDef="let r">{{ r.timestamp | date:'short' }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
